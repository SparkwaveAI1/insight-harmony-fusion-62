name: GAME SDK Smokes

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}  # lets you run it manually

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm ci || npm i --no-audit --no-fund --legacy-peer-deps

      - name: Run GAME smoke
        env:
          GAME_API_KEY: ${{ secrets.GAME_API_KEY }}
        run: |
          npx tsx scripts/game/smoke.ts

      - name: Run Twitter smoke
        env:
          GAME_API_KEY: ${{ secrets.GAME_API_KEY }}
        run: |
          npx tsx scripts/game/twitter.ts

      - name: Upload logs (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: game-smoke-logs
          path: |
            **/*.log
            **/logs/**