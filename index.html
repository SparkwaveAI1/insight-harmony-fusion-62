    <script>
      // Detect stale chunk errors and hard-reload to pick up new deployment.
      // Uses sessionStorage to prevent infinite reload loops.
      window.addEventListener('error', function(e) {
        var src = (e.filename || e.message || '');
        if (src.indexOf('/assets/') !== -1 && src.indexOf('Failed to fetch') !== -1) {
          var key = 'chunk_reload_' + src;
          if (!sessionStorage.getItem(key)) {
            sessionStorage.setItem(key, '1');
            window.location.replace(window.location.href.split('?')[0] + '?r=' + Date.now());
          }
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason || '');
        if (msg.indexOf('Failed to fetch dynamically imported module') !== -1) {
          var key = 'chunk_reload_rej_' + msg.slice(0, 80);
          if (!sessionStorage.getItem(key)) {
            sessionStorage.setItem(key, '1');
            window.location.replace(window.location.href.split('?')[0] + '?r=' + Date.now());
          }
        }
      });
