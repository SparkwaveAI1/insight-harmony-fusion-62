name: GAME SDK Smoke Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run smoke test
        run: npm run smoke
        env:
          GAME_API_KEY: ${{ secrets.GAME_API_KEY }}

      - name: Run Twitter smoke test
        run: npm run twitter-smoke
        env:
          GAME_API_KEY: ${{ secrets.GAME_API_KEY }}